<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Mazoon Al-Suhub Logo</title>
  <desc id="desc">Stylized gear and ring mark with Mazoon Al-Suhub Industrial Solutions text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#ca8a04"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="600" height="600" rx="80" fill="url(#bg)" stroke="#d1d5db" stroke-width="3"/>

  <g transform="translate(320 210)">
    <circle r="112" fill="none" stroke="url(#blue)" stroke-width="28" stroke-dasharray="16 10"/>
    <circle r="72" fill="none" stroke="#1e3a8a" stroke-width="18"/>
    <ellipse rx="170" ry="58" fill="none" stroke="url(#gold)" stroke-width="16" transform="rotate(-12)"/>
    <ellipse rx="160" ry="46" fill="none" stroke="#1d4ed8" stroke-width="8" opacity="0.65" transform="rotate(-12)"/>
    <circle r="46" fill="#f8fafc" stroke="#93c5fd" stroke-width="6"/>
  </g>

  <text x="320" y="410" text-anchor="middle" font-size="76" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#1d4ed8" letter-spacing="4">MAZOON</text>
  <text x="320" y="470" text-anchor="middle" font-size="60" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#a16207" letter-spacing="3">AL-SUHUB</text>
  <text x="320" y="525" text-anchor="middle" font-size="36" font-family="Arial, Helvetica, sans-serif" fill="#6b7280" letter-spacing="2">INDUSTRIAL SOLUTIONS</text>
</svg>
